name: AI Automated Two-Way Translation

on:
  push:
    branches:
      - main # 触发时机：中英文档在主干定稿合并后，自动反向构建补丁
    paths:
      - 'docsite/docs/**'
      - 'docsite/i18n/zh/docusaurus-plugin-content-docs/current/**'
      - 'docsite/sidebars.js'

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-translate:
    runs-on: ubuntu-latest
    steps:
      # 1. 获取代码，必须设置 fetch-depth: 2，否则 Python 里的 git diff 找不到上一次的 commit
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 2. 部署 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. 安装 OpenAI 官方 SDK 依赖
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      # 4. 🚀 运行双向 Python 智能翻译脚本
      - name: Run Two-Way AI Translation (Markdown + Sidebars)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}       # 需在 GitHub Settings 里配置
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}     # 如果使用国内中转站，在此配置
        run: python scripts/translate.py

      # 5. 配置 Git 自动化提交身份标识
      - name: Git Config
        run: |
          git config user.name "ChrisChen2023"
          git config user.email "chris.chen@vesoft.com"

      # 6. ⭐ 自动化提请翻译 PR（人工 Review，防止 AI 降智翻车）
      - name: Create Automated Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          reviewers: "ChrisChen2023"
          commit-message: "docs(i18n): 大模型 Agent 自动同步双向补丁与词条"
          committer: GitHub <noreply@github.com>
          author: ChrisChen2023 <chris.chen@vesoft.com>
          branch: bot/ai-translation-sync # 固定分支，重复触发时会自动覆盖该分支，不污染主干
          title: "🤖 [AI 自动化翻译] 中英文档增量双向补丁同步"
          body: |
            ## 🦾 大模型技术文档自动同步提示
            
            检测到最近有中/英文档在 `main` 分支定稿合并。
            本 PR 已由 Python 后端脚本自动拉取增量 `git diff`，并调用 AI 顺利完成了对侧镜像文件的翻译与同步。
            
            ### 📝 检查确认清单
            - [ ] 检查新生成的对侧语言 Markdown 语法、排版以及组件是否完好
            - [ ] 检查 `docsite/i18n/zh/code.json` 的菜单翻译是否正确
            
            确认无误后合并本 PR，文档中心即可全自动发布最新多语言版本。
          labels: |
            localization
            automated-pr