name: Vale Content Linting

on:
  pull_request:
    paths:
      - 'docs-2.0-en/**'
      - 'docs-2.0-zh/**'
      - '.vale.ini'
      - 'styles/**'
  push:
    branches:
      - main
      - master
      - v*
    paths:
      - 'docs-2.0-en/**'
      - 'docs-2.0-zh/**'
      - '.vale.ini'
      - 'styles/**'

jobs:
  vale:
    name: Vale Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Vale on English docs
        uses: errata-ai/vale-action@reviewdog
        with:
          files: docs-2.0-en
          reporter: github-pr-check
          level: warning
          fail_on_error: false
        continue-on-error: true

      - name: Run Vale on Chinese docs
        uses: errata-ai/vale-action@reviewdog
        with:
          files: docs-2.0-zh
          reporter: github-pr-check
          level: warning
          fail_on_error: false
        continue-on-error: true

      - name: Generate Vale Report
        if: always()
        run: |
          echo "## Vale Linting Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checked files:" >> $GITHUB_STEP_SUMMARY
          echo "- English docs: \`docs-2.0-en/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Chinese docs: \`docs-2.0-zh/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Style guides applied:" >> $GITHUB_STEP_SUMMARY
          echo "- Bilingual: Consistent terminology across languages" >> $GITHUB_STEP_SUMMARY
          echo "- English: English-specific style rules" >> $GITHUB_STEP_SUMMARY
          echo "- Chinese: Chinese-specific style rules" >> $GITHUB_STEP_SUMMARY
