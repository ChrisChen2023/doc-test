name: Vale Content Linting (PR Check)

on:
  pull_request:
    paths:
      - 'docs-2.0-en/**'
      - 'docs-2.0-zh/**'
      - '.vale.ini'
      - 'styles/**'
  push:
    branches:
      - main
      - master
    paths:
      - 'docs-2.0-en/**'
      - 'docs-2.0-zh/**'
      - '.vale.ini'
      - 'styles/**'

jobs:
  vale:
    name: Vale Linting (Early Feedback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Vale on English docs
        uses: vale-cli/vale-action@v2.1.1
        with:
          files: docs-2.0-en
          reporter: github-pr-check
          level: warning
          fail_on_error: false
        continue-on-error: true

      - name: Run Vale on Chinese docs
        uses: vale-cli/vale-action@v2.1.1
        with:
          files: docs-2.0-zh
          reporter: github-pr-check
          level: warning
          fail_on_error: false
        continue-on-error: true

      - name: Generate Vale Report
        if: always()
        run: |
          echo "## Vale Linting Report (PR Check)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Early feedback stage - Issues shown but don't block PR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Deployment workflows perform final validation with `fail_on_error: true`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checked files:" >> $GITHUB_STEP_SUMMARY
          echo "- English docs: \`docs-2.0-en/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Chinese docs: \`docs-2.0-zh/\`" >> $GITHUB_STEP_SUMMARY
