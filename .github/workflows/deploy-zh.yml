name: Publish Chinese docs via GitHub Pages 
env:


  ACTIONTEST: 3.9.0

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

on:
  workflow_call:

  push:
    branches:
      # Remember to add v before the following version number unless the version is master.
      - v3.9.0

    paths:
      - 'docs-2.0-zh/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch all commits/branches for gitversion

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name : prepare
        run: sh ./prepare.sh 

      - name: Git Config
        run: git config user.name ChrisChen2023 && git config user.email chris.chen@vesoft.com

          
      - name: Mike Deploy
        run: |
          python ./scripts/render_chinese_only.py
          git fetch origin gh-pages --depth=1 # fix mike's CI update
          mike list
          mike deploy ${{ env.ACTIONTEST }} -b gh-pages --deploy-prefix zh -p
          mike set-default ${{ env.ACTIONTEST }} -b gh-pages --deploy-prefix zh -p
    