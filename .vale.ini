# Vale Style Configuration for Bilingual Documentation

StylesPath = styles
MinAlertLevel = warning

# Default settings for all markdown files
[*.md]
BasedOnStyles = Vale

# English documentation settings
[docs-2.0-en/**.md]
BasedOnStyles = Vale, English
Lang = en

# Chinese documentation settings
[docs-2.0-zh/**.md]
BasedOnStyles = Vale, Chinese
Lang = zh

# Ignore non-content files
[*.{json,yml,yaml,sh}]
ignore = true
